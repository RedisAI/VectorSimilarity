name: focal flow

on: [workflow_dispatch, workflow_call]

jobs:
  focal:
    uses: ./.github/workflows/task-unit-test.yml
    with:
      container: ubuntu:focal
      pre-checkout-script: |
        sed -i 's|http://archive\.ubuntu\.com|http://azure.archive.ubuntu.com|g; s|http://security\.ubuntu\.com|http://azure.archive.ubuntu.com|g' /etc/apt/sources.list
        printf 'Acquire::Retries "10";\nAcquire::http::Timeout "30";\nAcquire::https::Timeout "30";\n' > /etc/apt/apt.conf.d/99-retries
        apt-get -o APT::Update::Error-Mode=any update && apt-get install -y git
